services:
  - type: web
    name: feapp-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: MONGO_TLS
        value: "true"
      - key: MONGO_TLS_ALLOW_INVALID_CERTIFICATES
        value: "false"
      - key: MONGO_IP_FAMILY
        value: "4"
      - key: MONGO_CONNECT_RETRIES
        value: "8"
      - key: MONGO_CONNECT_RETRY_DELAY_MS
        value: "3000"
      - key: MONGO_RECONNECT_DELAY_MS
        value: "15000"
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: NOTIFICATION_EMAIL_TO
        sync: false
